    <pattern id="data" width="72" height="54" patternUnits="userSpaceOnUse" patternTransform="rotate(-5)">
      <text x="2" y="9" font-family="SF Mono, Menlo, monospace" font-size="5.5" fill="#003388" opacity="0.07">∇²ψ = −ℏ²/2m</text>
      <text x="38" y="9" font-family="SF Mono, Menlo, monospace" font-size="4.5" fill="#006644" opacity="0.055">doi:10.1038</text>
      <text x="4" y="20" font-family="SF Mono, Menlo, monospace" font-size="4.5" fill="#0055AA" opacity="0.06">@article{vaswani}</text>
      <text x="40" y="20" font-family="SF Mono, Menlo, monospace" font-size="5.5" fill="#004488" opacity="0.04">∂E/∂t</text>
      <text x="1" y="31" font-family="SF Mono, Menlo, monospace" font-size="4.5" fill="#008855" opacity="0.05">H = Σ σᵢσⱼ</text>
      <text x="36" y="31" font-family="SF Mono, Menlo, monospace" font-size="4.5" fill="#0066BB" opacity="0.06">BibTeX:2025</text>
      <text x="6" y="42" font-family="SF Mono, Menlo, monospace" font-size="5.5" fill="#003388" opacity="0.04">∮ E·dl = 0</text>
      <text x="42" y="42" font-family="SF Mono, Menlo, monospace" font-size="4.5" fill="#006644" opacity="0.05">arXiv:2401</text>
      <text x="2" y="53" font-family="SF Mono, Menlo, monospace" font-size="4.5" fill="#0055AA" opacity="0.055">ISSN 0028-0836</text>
      <text x="44" y="53" font-family="SF Mono, Menlo, monospace" font-size="5.5" fill="#008855" opacity="0.04">∫ f(x)dx</text>
    </pattern>

    
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="g"></feGaussianBlur>
      <feMerge><feMergeNode in="g"></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>

    
    <filter id="cardSh1" x="-15%" y="-10%" width="135%" height="135%">
      <feDropShadow dx="-2" dy="4" stdDeviation="8" flood-color="#003388" flood-opacity="0.12"></feDropShadow>
    </filter>
    <filter id="cardSh2" x="-10%" y="-10%" width="130%" height="135%">
